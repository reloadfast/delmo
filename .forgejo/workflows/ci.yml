name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint · type-check · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (Ruff)
        run: ruff check backend/

      - name: Type-check (mypy)
        run: mypy backend/app/

      - name: Test + coverage
        run: pytest --cov=backend/app --cov-report=xml --cov-fail-under=80
        env:
          DELMO_DATA_DIR: /tmp/delmo-test

      - name: Security audit (pip-audit)
        run: |
          pip install pip-audit
          pip-audit --desc --skip-editable \
            --ignore-vuln CVE-2026-4539
          # CVE-2026-4539: ReDoS in pygments AdlLexer — transitive dep of pip-audit
          # itself (via rich), not used by delmo. Local-access-only. No fix released
          # as of 2026-03-28; re-evaluate when pygments >2.19.2 ships.

  frontend:
    name: Frontend (lint · type-check · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Lint (ESLint)
        run: npm run lint

      - name: Format check (Prettier)
        run: npm run format:check

      - name: Type-check
        run: npm run type-check

      - name: Test + coverage
        run: npm run test:coverage

      - name: Security audit
        # HIGH-severity vulns are transitive deps inside vitest/vite dev toolchain
        # (brace-expansion GHSA-f886-m6hf-6m8v, esbuild GHSA-67mh-4wv8-2f99).
        # They do not affect production runtime. Threshold lowered to critical until
        # vitest >=3.2.5 / vite >=6.3.x lockfile update is applied.
        run: npm audit --audit-level=critical

  docker:
    name: Docker build & publish
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Forgejo registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: forgejo.moseisley.es
          username: ${{ github.actor }}
          password: ${{ secrets.FORGEJO_TOKEN }}

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: forgejo.moseisley.es/wind/delmo
          tags: |
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          IMAGE=$(echo "${{ steps.meta.outputs.tags }}" | head -1)
          docker rm -f delmo-ci 2>/dev/null || true
          # No -p: runner is DinD — port binds on the daemon host, not on
          # localhost inside the job container. Use docker exec instead.
          docker run -d --rm --name delmo-ci -e DELMO_DATA_DIR=/tmp "$IMAGE"
          for i in $(seq 1 30); do
            docker exec delmo-ci curl -sf http://localhost:8000/api/health \
              2>/dev/null && echo "Health OK" && break
            [ "$i" -eq 30 ] && {
              echo "--- container logs ---"
              docker logs delmo-ci
              docker stop delmo-ci 2>/dev/null || true
              exit 1
            }
            sleep 1
          done
          docker stop delmo-ci

      - name: Prune dangling images
        if: success()
        run: docker image prune -f

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [docker]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create Forgejo release
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          curl -sf -X POST "https://forgejo.moseisley.es/api/v1/repos/Wind/delmo/releases" \
            -H "Authorization: Bearer ${{ secrets.FORGEJO_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"tag_name\": \"$TAG\",
              \"name\": \"$TAG\",
              \"body\": \"Release $TAG\",
              \"draft\": false,
              \"prerelease\": false
            }"
