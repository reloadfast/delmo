name: CI

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:

jobs:
  # ── Backend ──────────────────────────────────────────────────────────────
  backend:
    name: Backend (lint · type-check · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (Ruff)
        run: ruff check backend/

      - name: Type-check (mypy)
        run: mypy backend/app/

      - name: Test + coverage
        run: pytest --cov=backend/app --cov-report=xml --cov-fail-under=80
        env:
          DELMO_DATA_DIR: /tmp/delmo-test

      - name: Security audit (pip-audit)
        run: |
          pip install pip-audit
          pip-audit --desc

  # ── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (lint · type-check · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Lint (ESLint)
        run: npm run lint

      - name: Format check (Prettier)
        run: npm run format:check

      - name: Type-check
        run: npm run type-check

      - name: Test + coverage
        run: npm run test:coverage

      - name: Security audit
        run: npm audit --audit-level=high

  # ── Docker build, smoke test & publish ───────────────────────────────────
  docker:
    name: Docker build & publish
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            talesofthemoon/delmo
            ghcr.io/reloadfast/delmo
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          # Always load into local daemon so smoke test can run
          load: true
          # Only push to Docker Hub on main branch or version tags
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          IMAGE=$(echo "${{ steps.meta.outputs.tags }}" | head -1)
          docker run -d --name delmo-ci -p 8000:8000 -e DELMO_DATA_DIR=/tmp "$IMAGE"
          sleep 5
          curl -f http://localhost:8000/api/health
          docker stop delmo-ci

  # ── GitHub Release ────────────────────────────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [docker]
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true
