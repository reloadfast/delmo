name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── Backend ──────────────────────────────────────────────────────────────
  backend:
    name: Backend (lint · type-check · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (Ruff)
        run: ruff check backend/

      - name: Type-check (mypy)
        run: mypy backend/app/

      - name: Test + coverage
        run: pytest --cov=app --cov-report=xml --cov-fail-under=80
        env:
          DELMO_DATA_DIR: /tmp/delmo-test

      - name: Security audit (pip-audit)
        run: |
          pip install pip-audit
          pip-audit --desc

  # ── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (lint · type-check · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Lint (ESLint)
        run: npm run lint

      - name: Format check (Prettier)
        run: npm run format:check

      - name: Type-check
        run: npm run type-check

      - name: Test + coverage
        run: npm run test:coverage

      - name: Security audit
        run: npm audit --audit-level=high

  # ── Docker build verification ─────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t delmo:ci .

      - name: Smoke test
        run: |
          docker run -d --name delmo-ci -p 8000:8000 -e DELMO_DATA_DIR=/tmp delmo:ci
          sleep 5
          curl -f http://localhost:8000/api/health
          docker stop delmo-ci
