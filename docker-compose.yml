services:
  delmo:
    build: .
    container_name: delmo
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    environment:
      DELMO_DATA_DIR: /data
      # DELMO_SECRET_KEY: ""  # auto-generated if omitted
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
